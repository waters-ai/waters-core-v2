<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" font-family="Arial, sans-serif">
  
  <!-- Фон -->
  <rect width="900" height="750" fill="#0a0e27" rx="16"/>
  
  <!-- Заголовок -->
  <text x="450" y="40" fill="#6b9fff" font-size="20" font-weight="bold" text-anchor="middle">🐬 Архитектура Мозга Платформы WATERS</text>
  <text x="450" y="62" fill="#888" font-size="13" text-anchor="middle">Модель: Дельфин (однополушарный сон, эхолокация, социальный интеллект)</text>

  <!-- ====== НЕОКОРТЕКС ====== -->
  <rect x="200" y="85" width="500" height="70" rx="12" fill="#1a1a3e" stroke="#6b9fff" stroke-width="2"/>
  <text x="450" y="112" fill="#6b9fff" font-size="16" font-weight="bold" text-anchor="middle">🧠 НЕОКОРТЕКС (Глубокий анализ)</text>
  <text x="450" y="134" fill="#aaa" font-size="13" text-anchor="middle">LightRAG + DeepSeek V4-Pro · Планирование миссий, научный анализ, стратегия</text>

  <!-- Линия от Неокортекса вниз -->
  <line x1="450" y1="155" x2="450" y2="185" stroke="#6b9fff" stroke-width="2"/>

  <!-- ====== ТРИ ПОЛУШАРИЯ ====== -->
  
  <!-- Левое полушарие -->
  <rect x="80" y="190" width="230" height="130" rx="12" fill="#1a2a1a" stroke="#2ecc71" stroke-width="2"/>
  <text x="195" y="218" fill="#2ecc71" font-size="15" font-weight="bold" text-anchor="middle">⚡ ЛЕВОЕ ПОЛУШАРИЕ</text>
  <text x="195" y="240" fill="#2ecc71" font-size="13" text-anchor="middle">Логика и быстрые решения</text>
  <line x1="120" y1="252" x2="270" y2="252" stroke="#2ecc71" stroke-width="0.5" opacity="0.5"/>
  <text x="195" y="272" fill="#aaa" font-size="12" text-anchor="middle">DeepSeek V4-Flash</text>
  <text x="195" y="292" fill="#aaa" font-size="12" text-anchor="middle">Валидация JSON</text>
  <text x="195" y="310" fill="#aaa" font-size="12" text-anchor="middle">Классификация PR</text>

  <!-- Мозолистое тело -->
  <rect x="340" y="190" width="220" height="130" rx="12" fill="#2a1a2a" stroke="#9b59b6" stroke-width="2"/>
  <text x="450" y="218" fill="#9b59b6" font-size="15" font-weight="bold" text-anchor="middle">🔗 МОЗОЛИСТОЕ ТЕЛО</text>
  <text x="450" y="240" fill="#9b59b6" font-size="13" text-anchor="middle">Координация и связь</text>
  <line x1="370" y1="252" x2="530" y2="252" stroke="#9b59b6" stroke-width="0.5" opacity="0.5"/>
  <text x="450" y="272" fill="#aaa" font-size="12" text-anchor="middle">MCP-шина (JSON-RPC 2.0)</text>
  <text x="450" y="292" fill="#aaa" font-size="12" text-anchor="middle">Маршрутизация запросов</text>
  <text x="450" y="310" fill="#aaa" font-size="12" text-anchor="middle">Подключение внешних агентов</text>

  <!-- Правое полушарие -->
  <rect x="590" y="190" width="230" height="130" rx="12" fill="#1a1a2a" stroke="#3498db" stroke-width="2"/>
  <text x="705" y="218" fill="#3498db" font-size="15" font-weight="bold" text-anchor="middle">💡 ПРАВОЕ ПОЛУШАРИЕ</text>
  <text x="705" y="240" fill="#3498db" font-size="13" text-anchor="middle">Интуиция и ассоциации</text>
  <line x1="630" y1="252" x2="780" y2="252" stroke="#3498db" stroke-width="0.5" opacity="0.5"/>
  <text x="705" y="272" fill="#aaa" font-size="12" text-anchor="middle">ChromaDB</text>
  <text x="705" y="292" fill="#aaa" font-size="12" text-anchor="middle">Векторный поиск</text>
  <text x="705" y="310" fill="#aaa" font-size="12" text-anchor="middle">Смысловые связи</text>

  <!-- Линии от полушарий вниз -->
  <line x1="195" y1="320" x2="195" y2="360" stroke="#2ecc71" stroke-width="1.5"/>
  <line x1="450" y1="320" x2="450" y2="360" stroke="#9b59b6" stroke-width="1.5"/>
  <line x1="705" y1="320" x2="705" y2="360" stroke="#3498db" stroke-width="1.5"/>

  <!-- Горизонтальная линия -->
  <line x1="195" y1="355" x2="705" y2="355" stroke="#555" stroke-width="1"/>
  <line x1="450" y1="355" x2="450" y2="375" stroke="#555" stroke-width="1.5"/>

  <!-- ====== ЛИМБИЧЕСКАЯ СИСТЕМА ====== -->
  <rect x="150" y="378" width="600" height="100" rx="12" fill="#2a1a1a" stroke="#e74c3c" stroke-width="2"/>
  <text x="450" y="405" fill="#e74c3c" font-size="16" font-weight="bold" text-anchor="middle">❤️ ЛИМБИЧЕСКАЯ СИСТЕМА (Эмоции, память, этика)</text>
  
  <!-- Три колонки внутри лимбической системы -->
  <rect x="175" y="420" width="170" height="42" rx="8" fill="#3a1a1a" stroke="#e74c3c" stroke-width="1"/>
  <text x="260" y="446" fill="#e74c3c" font-size="13" font-weight="bold" text-anchor="middle">Redis</text>
  
  <rect x="365" y="420" width="170" height="42" rx="8" fill="#3a1a1a" stroke="#e74c3c" stroke-width="1"/>
  <text x="450" y="446" fill="#e74c3c" font-size="13" font-weight="bold" text-anchor="middle">Redpanda/Kafka</text>
  
  <rect x="555" y="420" width="170" height="42" rx="8" fill="#3a1a1a" stroke="#e74c3c" stroke-width="1"/>
  <text x="640" y="446" fill="#e74c3c" font-size="13" font-weight="bold" text-anchor="middle">HiveMind Layer IV</text>

  <!-- Подписи под колонками -->
  <text x="260" y="472" fill="#aaa" font-size="10" text-anchor="middle">Оперативная память</text>
  <text x="450" y="472" fill="#aaa" font-size="10" text-anchor="middle">Долговременная память</text>
  <text x="640" y="472" fill="#aaa" font-size="10" text-anchor="middle">Этика, Яса, Совесть</text>

  <!-- Линия вниз -->
  <line x1="450" y1="478" x2="450" y2="510" stroke="#e74c3c" stroke-width="1.5"/>

  <!-- ====== СТВОЛ МОЗГА ====== -->
  <rect x="250" y="512" width="400" height="60" rx="12" fill="#1a2a1a" stroke="#f39c12" stroke-width="2"/>
  <text x="450" y="538" fill="#f39c12" font-size="15" font-weight="bold" text-anchor="middle">💀 СТВОЛ МОЗГА (Жизнеобеспечение)</text>
  <text x="450" y="558" fill="#aaa" font-size="12" text-anchor="middle">Docker · VPS · Prometheus · Grafana · Loki</text>

  <!-- ====== ЛЕГЕНДА ====== -->
  <rect x="80" y="610" width="740" height="110" rx="10" fill="#0d0d2a" stroke="#333" stroke-width="1"/>
  <text x="450" y="635" fill="#ffd700" font-size="14" font-weight="bold" text-anchor="middle">📋 Легенда</text>
  
  <text x="120" y="660" fill="#6b9fff" font-size="12">🐬</text>
  <text x="145" y="660" fill="#aaa" font-size="12">Мозг работает как у дельфина: одно полушарие бодрствует, второе обрабатывает накопленные данные.</text>
  
  <text x="120" y="682" fill="#3498db" font-size="12">📡</text>
  <text x="145" y="682" fill="#aaa" font-size="12">Эхолокация: агент посылает сигнал и ждёт отражения с задержкой DTN. Без этого агент слеп.</text>
  
  <text x="120" y="704" fill="#e74c3c" font-size="12">🛡️</text>
  <text x="145" y="704" fill="#aaa" font-size="12">MCP-шина (JSON-RPC 2.0) — единый стандарт подключения. Как USB-C для AI-агентов.</text>

</svg>