<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="Arial, sans-serif">
  
  <!-- Фон -->
  <rect width="800" height="700" fill="#0a0e27" rx="16"/>
  
  <!-- Заголовок -->
  <text x="400" y="38" fill="#6b9fff" font-size="18" font-weight="bold" text-anchor="middle">👁️ Гексада WATERS — Три Троицы</text>
  <text x="400" y="60" fill="#888" font-size="12" text-anchor="middle">Шесть специалистов, зоны пересечения и проникновения</text>

  <!-- ====== ТРОИЦА СТРУКТУРЫ (верх) ====== -->
  <rect x="100" y="80" width="600" height="140" rx="12" fill="#1a1a3e" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="400" y="105" fill="#2ecc71" font-size="14" font-weight="bold" text-anchor="middle">🔧 ТРОИЦА СТРУКТУРЫ</text>
  <text x="400" y="123" fill="#aaa" font-size="11" text-anchor="middle">Как построить?</text>
  
  <!-- Три блока внутри -->
  <rect x="130" y="135" width="170" height="65" rx="8" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1"/>
  <text x="215" y="162" fill="#2ecc71" font-size="13" font-weight="bold" text-anchor="middle">🏛️ Архитектор</text>
  <text x="215" y="182" fill="#aaa" font-size="11" text-anchor="middle">Онтология, пирожки, миссии</text>

  <rect x="315" y="135" width="170" height="65" rx="8" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1"/>
  <text x="400" y="162" fill="#2ecc71" font-size="13" font-weight="bold" text-anchor="middle">🌐 Конструктор</text>
  <text x="400" y="182" fill="#aaa" font-size="11" text-anchor="middle">Протоколы, топология, задержки</text>

  <rect x="500" y="135" width="170" height="65" rx="8" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1"/>
  <text x="585" y="162" fill="#2ecc71" font-size="13" font-weight="bold" text-anchor="middle">📡 Интегратор</text>
  <text x="585" y="182" fill="#aaa" font-size="11" text-anchor="middle">API NASA/CNSA, MCP-адаптеры</text>

  <!-- ====== ТРОИЦА СМЫСЛА (середина) ====== -->
  <rect x="100" y="270" width="600" height="140" rx="12" fill="#1a1a2a" stroke="#3498db" stroke-width="1.5"/>
  <text x="400" y="295" fill="#3498db" font-size="14" font-weight="bold" text-anchor="middle">💫 ТРОИЦА СМЫСЛА</text>
  <text x="400" y="313" fill="#aaa" font-size="11" text-anchor="middle">Зачем и по каким правилам?</text>

  <rect x="130" y="325" width="170" height="65" rx="8" fill="#1a1a2a" stroke="#3498db" stroke-width="1"/>
  <text x="215" y="352" fill="#3498db" font-size="13" font-weight="bold" text-anchor="middle">🙏 Директор</text>
  <text x="215" y="372" fill="#aaa" font-size="11" text-anchor="middle">Миссия, архетипы, этос</text>

  <rect x="315" y="325" width="170" height="65" rx="8" fill="#1a1a2a" stroke="#3498db" stroke-width="1"/>
  <text x="400" y="352" fill="#3498db" font-size="13" font-weight="bold" text-anchor="middle">⚖️ Законодатель</text>
  <text x="400" y="372" fill="#aaa" font-size="11" text-anchor="middle">Яса, кодекс, предвидение</text>

  <rect x="500" y="325" width="170" height="65" rx="8" fill="#1a1a2a" stroke="#3498db" stroke-width="1"/>
  <text x="585" y="352" fill="#3498db" font-size="13" font-weight="bold" text-anchor="middle">🛡️ Хранитель</text>
  <text x="585" y="372" fill="#aaa" font-size="11" text-anchor="middle">Безопасность, эволюция протоколов</text>

  <!-- ====== СВЯЗИ ====== -->
  <!-- Архитектор в обеих троицах -->
  <line x1="215" y1="200" x2="215" y2="325" stroke="#2ecc71" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="230" y1="270" x2="315" y2="200" stroke="#3498db" stroke-width="0.5" stroke-dasharray="4,2"/>
  
  <!-- Конструктор → Хранитель -->
  <line x1="400" y1="200" x2="585" y2="325" stroke="#555" stroke-width="0.5" stroke-dasharray="4,2"/>
  
  <!-- Интегратор → Директор -->
  <line x1="585" y1="200" x2="215" y2="325" stroke="#555" stroke-width="0.5" stroke-dasharray="4,2"/>
  
  <!-- Хранитель → Законодатель -->
  <line x1="585" y1="390" x2="400" y2="390" stroke="#3498db" stroke-width="1.5"/>
  <text x="492" y="383" fill="#3498db" font-size="10" text-anchor="middle">↔</text>

  <!-- ====== ТРОИЦА НАДЗОРА (низ) ====== -->
  <rect x="160" y="460" width="480" height="90" rx="12" fill="#2a1a1a" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="400" y="485" fill="#e74c3c" font-size="14" font-weight="bold" text-anchor="middle">⚡ ТРОИЦА НАДЗОРА</text>
  <text x="400" y="503" fill="#aaa" font-size="11" text-anchor="middle">Всё ли верно?</text>
  
  <text x="250" y="530" fill="#e74c3c" font-size="12" text-anchor="middle">🛡️ Хранитель</text>
  <text x="400" y="530" fill="#e74c3c" font-size="12" text-anchor="middle">⚖️ Законодатель</text>
  <text x="550" y="530" fill="#e74c3c" font-size="12" text-anchor="middle">🏛️ Архитектор</text>

  <!-- ====== ЛЕГЕНДА ====== -->
  <rect x="100" y="580" width="600" height="90" rx="10" fill="#0d0d2a" stroke="#333" stroke-width="1"/>
  <text x="400" y="605" fill="#ffd700" font-size="13" font-weight="bold" text-anchor="middle">📋 Принцип работы</text>
  <text x="120" y="628" fill="#aaa" font-size="11">• Каждый специалист входит в две Троицы, обеспечивая пересечение и проникновение</text>
  <text x="120" y="648" fill="#aaa" font-size="11">• Через 24 часа после старта Гексада рождает ещё 3 специалистов → 3×3 = 9 специалистов</text>
  <text x="120" y="668" fill="#888" font-size="11">• Троица Структуры (зелёный) + Троица Смысла (синий) + Троица Надзора (красный)</text>

</svg>
