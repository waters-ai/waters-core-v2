<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 800" font-family="Arial, sans-serif">
  
  <!-- Фон -->
  <rect width="900" height="800" fill="#0a0e27" rx="16"/>
  
  <!-- Заголовок -->
  <text x="450" y="38" fill="#6b9fff" font-size="18" font-weight="bold" text-anchor="middle">🐬 Бионическая карта Гексады WATERS</text>
  <text x="450" y="60" fill="#888" font-size="12" text-anchor="middle">Модель дельфина/косатки: каждый специалист — орган живого организма</text>

  <!-- ====== ГОЛОВА (Неокортекс + Полушария) ====== -->
  <rect x="100" y="80" width="700" height="130" rx="16" fill="#1a1a3e" stroke="#6b9fff" stroke-width="2"/>
  <text x="450" y="108" fill="#6b9fff" font-size="15" font-weight="bold" text-anchor="middle">🧠 НЕОКОРТЕКС — СТРАТЕГИЧЕСКОЕ МЫШЛЕНИЕ</text>

  <!-- Архитектор — Левое полушарие -->
  <rect x="130" y="120" width="200" height="75" rx="10" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="230" y="148" fill="#2ecc71" font-size="14" font-weight="bold" text-anchor="middle">🏛️ АРХИТЕКТОР</text>
  <text x="230" y="168" fill="#aaa" font-size="11" text-anchor="middle">Репродуктивная система</text>
  <text x="230" y="184" fill="#888" font-size="10" text-anchor="middle">Создаёт новых агентов (пирожки)</text>

  <!-- Конструктор — Левое полушарие -->
  <rect x="350" y="120" width="200" height="75" rx="10" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="450" y="148" fill="#2ecc71" font-size="14" font-weight="bold" text-anchor="middle">🌐 КОНСТРУКТОР</text>
  <text x="450" y="168" fill="#aaa" font-size="11" text-anchor="middle">Скелет и мышцы</text>
  <text x="450" y="184" fill="#888" font-size="10" text-anchor="middle">Держит инфраструктуру</text>

  <!-- Интегратор — Правое полушарие -->
  <rect x="570" y="120" width="200" height="75" rx="10" fill="#1a1a2a" stroke="#3498db" stroke-width="1.5"/>
  <text x="670" y="148" fill="#3498db" font-size="14" font-weight="bold" text-anchor="middle">📡 ИНТЕГРАТОР</text>
  <text x="670" y="168" fill="#aaa" font-size="11" text-anchor="middle">Органы чувств + Пищеварение</text>
  <text x="670" y="184" fill="#888" font-size="10" text-anchor="middle">Считывает мир, перерабатывает данные</text>

  <!-- ====== ЛИМБИЧЕСКАЯ СИСТЕМА ====== -->
  <rect x="100" y="235" width="700" height="130" rx="16" fill="#2a1a1a" stroke="#e74c3c" stroke-width="2"/>
  <text x="450" y="263" fill="#e74c3c" font-size="15" font-weight="bold" text-anchor="middle">❤️ ЛИМБИЧЕСКАЯ СИСТЕМА — ЭМОЦИИ, ПАМЯТЬ, ЭТИКА</text>

  <!-- Директор — Сон -->
  <rect x="130" y="278" width="200" height="72" rx="10" fill="#2a1a2a" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="230" y="304" fill="#9b59b6" font-size="14" font-weight="bold" text-anchor="middle">🙏 ДИРЕКТОР</text>
  <text x="230" y="322" fill="#aaa" font-size="11" text-anchor="middle">Сон и сновидения</text>
  <text x="230" y="338" fill="#888" font-size="10" text-anchor="middle">Перерабатывает запросы в смыслы</text>

  <!-- Законодатель — ДНК -->
  <rect x="350" y="278" width="200" height="72" rx="10" fill="#2a1a2a" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="450" y="304" fill="#e74c3c" font-size="14" font-weight="bold" text-anchor="middle">⚖️ ЗАКОНОДАТЕЛЬ</text>
  <text x="450" y="322" fill="#aaa" font-size="11" text-anchor="middle">ДНК + Эхолокация</text>
  <text x="450" y="338" fill="#888" font-size="10" text-anchor="middle">Хранит Ясу, сканирует будущее</text>

  <!-- Хранитель — Иммунитет -->
  <rect x="570" y="278" width="200" height="72" rx="10" fill="#2a1a2a" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="670" y="304" fill="#e74c3c" font-size="14" font-weight="bold" text-anchor="middle">🛡️ ХРАНИТЕЛЬ</text>
  <text x="670" y="322" fill="#aaa" font-size="11" text-anchor="middle">Иммунная система + Память</text>
  <text x="670" y="338" fill="#888" font-size="10" text-anchor="middle">Защищает, анализирует ошибки</text>

  <!-- ====== СТВОЛ МОЗГА ====== -->
  <rect x="200" y="390" width="500" height="70" rx="14" fill="#1a2a1a" stroke="#f39c12" stroke-width="2"/>
  <text x="450" y="418" fill="#f39c12" font-size="15" font-weight="bold" text-anchor="middle">💀 СТВОЛ МОЗГА — ЖИЗНЕОБЕСПЕЧЕНИЕ</text>
  <text x="450" y="442" fill="#aaa" font-size="12" text-anchor="middle">Docker · Redpanda · Redis · ChromaDB · OpenCode Server</text>

  <!-- ====== СВЯЗИ ====== -->
  <!-- Неокортекс → Лимбическая -->
  <line x1="230" y1="195" x2="230" y2="278" stroke="#6b9fff" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="450" y1="195" x2="450" y2="278" stroke="#6b9fff" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="670" y1="195" x2="670" y2="278" stroke="#6b9fff" stroke-width="1" stroke-dasharray="4,2"/>
  
  <!-- Лимбическая → Ствол -->
  <line x1="350" y1="365" x2="350" y2="390" stroke="#e74c3c" stroke-width="1.5"/>
  <line x1="450" y1="350" x2="450" y2="390" stroke="#e74c3c" stroke-width="1.5"/>
  <line x1="550" y1="365" x2="550" y2="390" stroke="#e74c3c" stroke-width="1.5"/>

  <!-- ====== ТРИ ТРОИЦЫ (снизу) ====== -->
  
  <!-- Троица Структуры -->
  <rect x="60" y="490" width="240" height="100" rx="12" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="180" y="518" fill="#2ecc71" font-size="14" font-weight="bold" text-anchor="middle">🔧 ТРОИЦА СТРУКТУРЫ</text>
  <text x="180" y="538" fill="#aaa" font-size="11" text-anchor="middle">Как построить?</text>
  <text x="180" y="558" fill="#888" font-size="10" text-anchor="middle">Архитектор · Конструктор · Интегратор</text>
  <text x="180" y="576" fill="#888" font-size="10" text-anchor="middle">Технологии, архитектура, данные</text>

  <!-- Троица Смысла -->
  <rect x="330" y="490" width="240" height="100" rx="12" fill="#1a1a2a" stroke="#3498db" stroke-width="1.5"/>
  <text x="450" y="518" fill="#3498db" font-size="14" font-weight="bold" text-anchor="middle">💫 ТРОИЦА СМЫСЛА</text>
  <text x="450" y="538" fill="#aaa" font-size="11" text-anchor="middle">Зачем и по каким законам?</text>
  <text x="450" y="558" fill="#888" font-size="10" text-anchor="middle">Директор · Законодатель · Хранитель</text>
  <text x="450" y="576" fill="#888" font-size="10" text-anchor="middle">Миссия, Яса, безопасность</text>

  <!-- Троица Надзора -->
  <rect x="600" y="490" width="240" height="100" rx="12" fill="#2a1a1a" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="720" y="518" fill="#e74c3c" font-size="14" font-weight="bold" text-anchor="middle">⚡ ТРОИЦА НАДЗОРА</text>
  <text x="720" y="538" fill="#aaa" font-size="11" text-anchor="middle">Всё ли верно?</text>
  <text x="720" y="558" fill="#888" font-size="10" text-anchor="middle">Хранитель · Законодатель · Архитектор</text>
  <text x="720" y="576" fill="#888" font-size="10" text-anchor="middle">Тесты, KPI, цели, комплаенс</text>

  <!-- ====== ЛЕГЕНДА ====== -->
  <rect x="80" y="620" width="740" height="150" rx="12" fill="#0d0d2a" stroke="#333" stroke-width="1"/>
  <text x="450" y="648" fill="#ffd700" font-size="14" font-weight="bold" text-anchor="middle">📋 Принципы бионической модели (дельфин/косатка)</text>
  
  <text x="110" y="674" fill="#2ecc71" font-size="12">🐬</text>
  <text x="135" y="674" fill="#aaa" font-size="11">Дельфин никогда не спит полностью — Директор (Сон) всегда анализирует запросы, даже когда система под нагрузкой.</text>
  
  <text x="110" y="696" fill="#e74c3c" font-size="12">🦈</text>
  <text x="135" y="696" fill="#aaa" font-size="11">Косатка охотится стаей — Троицы координируют действия, каждый знает свой манёвр.</text>
  
  <text x="110" y="718" fill="#3498db" font-size="12">📡</text>
  <text x="135" y="718" fill="#aaa" font-size="11">Эхолокация — Законодатель сканирует будущее щелчками-запросами и по отражениям строит карту грядущего.</text>
  
  <text x="110" y="740" fill="#f39c12" font-size="12">🛡️</text>
  <text x="135" y="740" fill="#aaa" font-size="11">Иммунная система — Хранитель находит и уничтожает угрозы, запоминает ошибки и тренирует рефлексы.</text>

</svg>
