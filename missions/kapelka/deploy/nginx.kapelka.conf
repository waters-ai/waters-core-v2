# nginx.kapelka.conf — шаблон Nginx для SPA-сайта (React/Vite)
# Использование:
#   1. Заменить EXAMPLE.COM на реальный домен
#   2. Заменить /var/www/PROJECT на реальный путь
#   3. Запустить: certbot --nginx -d EXAMPLE.COM -d www.EXAMPLE.COM

upstream solana_rpc {
    # Если есть свой Solana RPC-прокси
    server 127.0.0.1:8899;
}

server {
    listen 80;
    server_name EXAMPLE.COM www.EXAMPLE.COM;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name EXAMPLE.COM www.EXAMPLE.COM;

    # ===== Путь к статике =====
    root /var/www/PROJECT/current;
    index index.html;

    # ===== SSL (Let's Encrypt) =====
    ssl_certificate     /etc/letsencrypt/live/EXAMPLE.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/EXAMPLE.COM/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ===== Security Headers =====
    add_header Strict-Transport-Security          "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options                    "DENY" always;
    add_header X-Content-Type-Options             "nosniff" always;
    add_header Referrer-Policy                    "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy                 "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://api.mainnet-beta.solana.com; frame-ancestors 'none';" always;

    # ===== Gzip =====
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ===== SPA fallback =====
    location / {
        try_files $uri $uri/ /index.html;

        # Кэширование HTML — не кэшировать (всегда свежий)
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ===== Статические ассеты (хэшированные Vite) =====
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ===== Favicon и robots =====
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # ===== Solana API proxy (если нужно) =====
    location /api/solana/ {
        proxy_pass http://solana_rpc/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting
        limit_req zone=solana burst=10 nodelay;
        limit_req_status 429;
    }

    # ===== Rate limiting zones =====
    limit_req_zone $binary_remote_addr zone=solana:10m rate=5r/s;

    # ===== Запрет доступа к служебным файлам =====
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
