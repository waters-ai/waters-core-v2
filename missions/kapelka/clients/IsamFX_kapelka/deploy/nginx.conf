worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens   off;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Rate limiting ─────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=spa:10m rate=30r/s;

    # ── Security headers (default) ────────────────────────────────
    map $upstream_http_content_type $x_frame_options {
        default "SAMEORIGIN";
    }

    server {
        listen 80;
        listen [::]:80;

        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── Rate limiting ─────────────────────────────────────────
        limit_req zone=spa burst=50 nodelay;
        limit_req_status 429;

        # ── Security headers ──────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

        # ── Assets cache (fingerprinted) ──────────────────────────
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable, no-transform";
            try_files $uri =404;
        }

        # ── SPA fallback ──────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;

            location ~ \.html$ {
                add_header Cache-Control "no-cache, must-revalidate";
            }
        }

        # ── Deny hidden files ─────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Deny dotfiles ─────────────────────────────────────────
        location ~ /(\.git|\.env|composer\.json|package\.json|package-lock\.json|node_modules) {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ── SSL server (разкомментировать после получения сертификата) ─
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/ssl/certs/fullchain.pem;
    #     ssl_certificate_key /etc/ssl/private/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
